name: CI/CD + DevSecOps Pipeline

on:
  push:
    branches: [main]

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # NODE SETUP
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # -------------------------
      # INSTALL
      # -------------------------
      - name: Install Dependencies
        run: npm ci

      # -------------------------
      # LINT + TYPE CHECK
      # -------------------------
      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build Next.js App
        run: npm run build

      # -------------------------
      # SECURITY: DEPENDENCY AUDIT
      # -------------------------
      - name: Audit Dependencies
        run: npm audit --audit-level=high

      # -------------------------
      # SECURITY: CODEQL (SAST)
      # -------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Analyze Code
        uses: github/codeql-action/analyze@v3

      # -------------------------
      # SECURITY: SECRET SCAN
      # -------------------------
      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@main

      # -------------------------
      # DOCKER LOGIN
      # -------------------------
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -------------------------
      # BUILD IMAGE
      # -------------------------
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/classified-app:latest .

      # -------------------------
      # SECURITY: IMAGE SCAN (TRIVY)
      # -------------------------
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/classified-app:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # -------------------------
      # PUSH IMAGE
      # -------------------------
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/classified-app:latest

      # -------------------------
      # DEPLOY TO EC2
      # -------------------------
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/classified-app:latest

            docker stop classified-app || true
            docker rm classified-app || true

            docker run -d \
              --name classified-app \
              -p 80:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e AWS_EMAIL_FROM="${{secrets.AWS_EMAIL_FROM}}" \
              -e ACCESS_MODERATOR="${{secrets.ACCESS_MODERATOR}}" \
              -e ADVERTISEMENTS_SAVE_PATH_LOCAL="${{secrets.ADVERTISEMENTS_SAVE_PATH_LOCAL}}" \
              classified-app