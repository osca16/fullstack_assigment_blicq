name: CI/CD + DevSecOps Pipeline

on:
  push:
    branches: [main]

jobs:
  # ---------------------------------
  # 1. BUILD + TEST
  # ---------------------------------
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Build Next.js App
        run: npm run build

      - name: Audit Dependencies
        run: npm audit --audit-level=high

  # ---------------------------------
  # 2. SECRET SCAN
  # ---------------------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan for Secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main

  # ---------------------------------
  # 3. DOCKER BUILD + SCAN + PUSH
  # ---------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/classified-app:latest .

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/classified-app:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/classified-app:latest

  # ---------------------------------
  # 4. DEPLOY TO EC2
  # ---------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/classified-app:latest

            docker stop classified-app || true
            docker rm classified-app || true

            docker run -d \
              --name classified-app \
              -p 80:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e AWS_EMAIL_FROM="${{ secrets.AWS_EMAIL_FROM }}" \
              -e ACCESS_MODERATOR="${{ secrets.ACCESS_MODERATOR }}" \
              -e ADVERTISEMENTS_SAVE_PATH_LOCAL="${{ secrets.ADVERTISEMENTS_SAVE_PATH_LOCAL }}" \
              ${{ secrets.DOCKER_USERNAME }}/classified-app:latest